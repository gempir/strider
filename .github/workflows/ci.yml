name: ci

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - run: go test ./...
            - run: go vet ./...

    race:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - run: go test -race ./...

    docs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.5"
            - name: Install documentation dependencies
              working-directory: docs
              run: bun ci
            - name: Build documentation and benchmark pages
              working-directory: docs
              run: bun run build

    corpus:
        name: open-source corpus and performance
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Check deterministic behavior and performance budgets
              run: make corpus-check
            - name: Upload corpus reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: strider-corpus-report
                  path: target/corpus/
                  if-no-files-found: warn
                  retention-days: 30
