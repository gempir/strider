a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h2,
h3,
h4,
h5,
h6,

  width: 100%;
  padding: 0;

.card {

  padding: 12px;

  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);

  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;

.tooltip {

  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;

  background: var(--popover);

.viz-stat-value {

.viz-row {

  flex-wrap: wrap;
  align-items: center;
  gap: 10px;

.text-muted {

}

.sr-only {

  width: 1px;
  height: 1px;
  padding: 0;

  clip: rect(0, 0, 0, 0);

.viz-controls {

.btn {

  min-height: 28px;
  align-items: center;

  margin-bottom: 6px;

  min-height: 28px;

  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);

  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

        o(&#x27;best-effort&#x27;, &#x27;Format valid regions&#x27;, &#x27;best-effort&#x27;, &#x27;Rewrite parseable ranges and preserve invalid spans.&#x27;, &#x27;func good() {}\nfunc broken( {&#x27;, &#x27;requires-error-tolerant-parser&#x27;),
        o(&#x27;skip&#x27;, &#x27;Silently skip&#x27;, &#x27;skip&#x27;, &#x27;Return the original source without a finding.&#x27;, &#x27;unchanged invalid source&#x27;, &#x27;unsafe&#x27;)
      ]),
      d(&#x27;Alignment &amp; guardrails&#x27;, &#x27;full-file-scope&#x27;, &#x27;Formatting scope&#x27;, &#x27;Should the formatter support only full files or also selected ranges?&#x27;, &#x27;scope&#x27;, &#x27;full-file&#x27;, [
        o(&#x27;full-file&#x27;, &#x27;Full file only&#x27;, &#x27;full-file&#x27;, &#x27;Canonicalize the entire source and imports as one unit.&#x27;, &#x27;strider fmt path/to/file.go&#x27;),
        o(&#x27;range-expand&#x27;, &#x27;Range, expanded to syntax nodes&#x27;, &#x27;range-expand&#x27;, &#x27;Format selected nodes plus the minimum context needed for stable indentation.&#x27;, &#x27;format lines 20–35&#x27;, &#x27;requires-new-printer&#x27;),
        o(&#x27;range-exact&#x27;, &#x27;Exact byte range&#x27;, &#x27;range-exact&#x27;, &#x27;Restrict edits to the selection even if surrounding layout stays noncanonical.&#x27;, &#x27;format bytes 420–860&#x27;, &#x27;requires-new-printer&#x27;)
      ]),
      d(&#x27;Alignment &amp; guardrails&#x27;, &#x27;exclusions&#x27;, &#x27;Filesystem exclusions&#x27;, &#x27;How should project paths opt out during discovery?&#x27;, &#x27;excludes&#x27;, &#x27;glob-list&#x27;, [
        o(&#x27;glob-list&#x27;, &#x27;Configured path/glob list&#x27;, [&#x27;internal/generated/**&#x27;], &#x27;Current configuration supports plain paths, *, ?, character classes, and recursive **.&#x27;, &#x27;[formatter]\nexcludes = [&quot;internal/generated/**&quot;]&#x27;, &#x27;current-config&#x27;),
        o(&#x27;gitignore&#x27;, &#x27;Reuse .gitignore&#x27;, &#x27;gitignore&#x27;, &#x27;Automatically skip ignored files in addition to explicit formatter paths.&#x27;, &#x27;[formatter]\nrespect-gitignore = true&#x27;, &#x27;requires-new-printer&#x27;),
        o(&#x27;none&#x27;, &#x27;No filesystem exclusions&#x27;, [], &#x27;Format every discovered Go file unless it has a source directive.&#x27;, &#x27;[formatter]\nexcludes = []&#x27;, &#x27;current-config&#x27;)
      ], true)
    ];

    const storageKey = &#x27;strider-formatter-policy-v1&#x27;;
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(storageKey) || &#x27;{}&#x27;); } catch (_) { saved = {}; }
    const state = {};
    for (const item of decisions) {
      const prior = saved[item.id] || {};
      state[item.id] = {
        selected: item.options.some(option =&gt; option.id === prior.selected) ? prior.selected : item.current,
        decided: prior.decided === true,
        configurable: typeof prior.configurable === &#x27;boolean&#x27; ? prior.configurable : item.configurableNow
      };
    }

    const groups = [...new Set(decisions.map(item =&gt; item.group))];
    const slug = value =&gt; value.toLowerCase().replace(/[^a-z0-9]+/g, &#x27;-&#x27;).replace(/^-|-$/g, &#x27;&#x27;);
    const escapeHTML = value =&gt; String(value).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, char =&gt; ({ &#x27;&amp;&#x27;: &#x27;&amp;amp;&#x27;, &#x27;&lt;&#x27;: &#x27;&amp;lt;&#x27;, &#x27;&gt;&#x27;: &#x27;&amp;gt;&#x27;, &#x27;&quot;&#x27;: &#x27;&amp;quot;&#x27;, &quot;&#x27;&quot;: &#x27;&amp;#39;&#x27; }[char]));
    const nav = root.querySelector(&#x27;#category-nav&#x27;);
    const catalog = root.querySelector(&#x27;#decision-catalog&#x27;);

    nav.innerHTML = groups.map(group =&gt; {
      const count = decisions.filter(item =&gt; item.group === group).length;
      return `&lt;li&gt;&lt;a class=&quot;btn btn-ghost&quot; href=&quot;#category-${slug(group)}&quot;&gt;${escapeHTML(group)} &lt;span class=&quot;text-muted&quot;&gt;${count}&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;`;
    }).join(&#x27;&#x27;);

    function optionMarkup(item, option) {
      const inputId = `${item.id}-${option.id}`;
      const current = option.id === item.current ? &#x27;&lt;span class=&quot;viz-badge&quot;&gt;Current&lt;/span&gt;&#x27; : &#x27;&#x27;;
      return `&lt;label class=&quot;option&quot; for=&quot;${escapeHTML(inputId)}&quot;&gt;
        &lt;span class=&quot;option-main&quot;&gt;
          &lt;input class=&quot;form-check-input&quot; type=&quot;radio&quot; id=&quot;${escapeHTML(inputId)}&quot; name=&quot;${escapeHTML(item.id)}&quot; value=&quot;${escapeHTML(option.id)}&quot; ${state[item.id].selected === option.id ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;
          &lt;span class=&quot;option-copy&quot;&gt;&lt;span class=&quot;option-label&quot;&gt;${escapeHTML(option.label)}&lt;/span&gt; ${current}&lt;span class=&quot;viz-badge&quot;&gt;${escapeHTML(option.compatibility)}&lt;/span&gt;&lt;span class=&quot;option-summary&quot;&gt;${escapeHTML(option.summary)}&lt;/span&gt;&lt;/span&gt;
        &lt;/span&gt;
        &lt;pre&gt;&lt;code&gt;${escapeHTML(option.code)}&lt;/code&gt;&lt;/pre&gt;
      &lt;/label&gt;`;
    }

    function decisionMarkup(item, index) {
      const status = item.configurableNow ? &#x27;Configurable today&#x27; : &#x27;Fixed today&#x27;;
      return `&lt;article class=&quot;decision&quot; id=&quot;decision-${escapeHTML(item.id)}&quot; data-id=&quot;${escapeHTML(item.id)}&quot;&gt;
        &lt;div class=&quot;decision-head&quot;&gt;
          &lt;div&gt;&lt;h3&gt;${index + 1}. ${escapeHTML(item.title)}&lt;/h3&gt;&lt;p class=&quot;decision-question&quot;&gt;${escapeHTML(item.question)}&lt;/p&gt;&lt;/div&gt;
          &lt;div class=&quot;badges&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHTML(status)}&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHTML(item.key)}&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
        ${item.note ? `&lt;p class=&quot;text-small text-muted&quot;&gt;${escapeHTML(item.note)}&lt;/p&gt;` : &#x27;&#x27;}
        &lt;div class=&quot;options&quot;&gt;${item.options.map(option =&gt; optionMarkup(item, option)).join(&#x27;&#x27;)}&lt;/div&gt;
        &lt;div class=&quot;decision-actions&quot;&gt;
          &lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input decision-done&quot; type=&quot;checkbox&quot; ${state[item.id].decided ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;form-check-label&quot;&gt;Decision made&lt;/span&gt;&lt;/label&gt;
          &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input decision-config&quot; type=&quot;checkbox&quot; ${state[item.id].configurable ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;form-check-label&quot;&gt;Expose in configuration&lt;/span&gt;&lt;/label&gt;
          &lt;span class=&quot;config-key&quot;&gt;Proposed key: &lt;code&gt;formatter.${escapeHTML(item.key)}&lt;/code&gt;&lt;/span&gt;
        &lt;/div&gt;
      &lt;/article&gt;`;
    }

    catalog.innerHTML = groups.map(group =&gt; {
      const items = decisions.filter(item =&gt; item.group === group);
      return `&lt;section class=&quot;category&quot; id=&quot;category-${slug(group)}&quot;&gt;&lt;div class=&quot;category-heading&quot;&gt;&lt;h2&gt;${escapeHTML(group)}&lt;/h2&gt;&lt;span class=&quot;text-muted&quot;&gt;${items.length} decisions&lt;/span&gt;&lt;/div&gt;${items.map(item =&gt; decisionMarkup(item, decisions.indexOf(item))).join(&#x27;&#x27;)}&lt;/section&gt;`;
    }).join(&#x27;&#x27;);

    function selectedOption(item) {
      return item.options.find(option =&gt; option.id === state[item.id].selected) || item.options[0];
    }

    function tomlValue(value) {
      if (typeof value === &#x27;boolean&#x27; || typeof value === &#x27;number&#x27;) return String(value);
      if (Array.isArray(value)) return `[${value.map(tomlValue).join(&#x27;, &#x27;)}]`;
      return JSON.stringify(String(value));
    }

    function persistAndRender() {
      try { localStorage.setItem(storageKey, JSON.stringify(state)); } catch (_) { /* Standalone sandbox: use the export fields instead. */ }
      const complete = decisions.filter(item =&gt; state[item.id].decided).length;
      const configurable = decisions.filter(item =&gt; state[item.id].configurable).length;
      const percent = Math.round((complete / decisions.length) * 100);
      root.querySelector(&#x27;#decision-total&#x27;).textContent = decisions.length;
      root.querySelector(&#x27;#decision-complete&#x27;).textContent = complete;
      root.querySelector(&#x27;#decision-configurable&#x27;).textContent = configurable;
      root.querySelector(&#x27;#decision-remaining&#x27;).textContent = complete === decisions.length ? &#x27;All decisions recorded&#x27; : `${decisions.length - complete} remaining`;
      root.querySelector(&#x27;#decision-progress&#x27;).max = decisions.length;
      root.querySelector(&#x27;#decision-progress&#x27;).value = complete;
      root.querySelector(&#x27;#decision-percent&#x27;).textContent = `${percent}%`;

      const record = {
        format: &#x27;strider-formatter-decisions&#x27;,
        version: 1,
        completed: complete,
        total: decisions.length,
        decisions: decisions.map(item =&gt; {
          const option = selectedOption(item);
          return {
            id: item.id,
            category: item.group,
            decision: item.title,
            selected: option.id,
            value: option.value,
            current_strider: item.current,
            decided: state[item.id].decided,
            configurable: state[item.id].configurable,
            proposed_key: `formatter.${item.key}`,
            compatibility: option.compatibility
          };
        })
      };
      root.querySelector(&#x27;#json-output&#x27;).value = JSON.stringify(record, null, 2);

      const configured = decisions.filter(item =&gt; state[item.id].configurable);
      const lines = [&#x27;version = 1&#x27;, &#x27;&#x27;, &#x27;[formatter]&#x27;];
      for (const item of configured) {
        const option = selectedOption(item);
        lines.push(`${item.key} = ${tomlValue(option.value)}`);
      }
      if (configured.length === 0) lines.push(&#x27;# No formatter options selected for configuration.&#x27;);
      root.querySelector(&#x27;#toml-output&#x27;).value = lines.join(&#x27;\n&#x27;) + &#x27;\n&#x27;;
    }

    catalog.addEventListener(&#x27;change&#x27;, event =&gt; {
      const article = event.target.closest(&#x27;.decision&#x27;);
      if (!article) return;
      const id = article.dataset.id;
      if (event.target.matches(&#x27;input[type=&quot;radio&quot;]&#x27;)) {
        state[id].selected = event.target.value;
        state[id].decided = true;
        article.querySelector(&#x27;.decision-done&#x27;).checked = true;
      } else if (event.target.matches(&#x27;.decision-done&#x27;)) {
        state[id].decided = event.target.checked;
      } else if (event.target.matches(&#x27;.decision-config&#x27;)) {
        state[id].configurable = event.target.checked;
      }
      persistAndRender();
    });

    async function copyFrom(selector, label) {
      const output = root.querySelector(selector);
      try {
        await navigator.clipboard.writeText(output.value);
        root.querySelector(&#x27;#copy-status&#x27;).textContent = `${label} copied.`;
      } catch (_) {
        output.focus();
        output.select();
        root.querySelector(&#x27;#copy-status&#x27;).textContent = `Clipboard unavailable; ${label} selected for manual copy.`;
      }
    }
    root.querySelector(&#x27;#copy-json&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; copyFrom(&#x27;#json-output&#x27;, &#x27;Decision JSON&#x27;));
    root.querySelector(&#x27;#copy-toml&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; copyFrom(&#x27;#toml-output&#x27;, &#x27;TOML draft&#x27;));
    persistAndRender();
  })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;

&lt;/body&gt;
&lt;/html&gt;
"></iframe>
