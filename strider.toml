version = 1

[formatter]
print-width = 180
excludes = ["internal/generated/**"]

# The repository predates these warning- and error-level policies and has
# existing violations. Keep them active as advisory checks while ordinary
# self-checks remain focused on newly enforced warnings.
[checks.cognitive-complexity]
severity = "note"

[checks.confusing-naming]
severity = "note"

[checks.confusing-results]
severity = "note"

[checks.cyclomatic-complexity]
severity = "note"

[checks.deep-exit]
severity = "note"

[checks.early-return]
severity = "note"

[checks.function-result-limit]
severity = "note"

[checks.identical-switch-branches]
severity = "note"

[checks.import-shadowing]
severity = "note"

[checks.inefficient-map-lookup]
severity = "note"

[checks.max-control-nesting]
severity = "note"

[checks.optimize-operands-order]
severity = "note"

[checks.range-value-address]
severity = "note"

[checks.range-value-capture]
severity = "note"

[checks.redefines-builtin-id]
severity = "note"

[checks.unchecked-type-assertion]
severity = "note"

[checks.insecure-url-scheme]
severity = "note"

# Newly classified policies remain advisory for this repository's existing
# code; their built-in defaults are still warning or error for other projects.
[checks.constant-negative-zero]
severity = "note"
[checks.top-level-declaration-order]
severity = "note"
[checks.deprecated-api-usage]
severity = "note"
[checks.empty-conditional-block]
severity = "note"
[checks.enforce-switch-style]
severity = "note"
[checks.error-naming]
severity = "note"
[checks.error-last-result]
severity = "note"
[checks.error-strings]
severity = "note"
[checks.error-type-naming]
severity = "note"
[checks.prefer-fmt-errorf]
severity = "note"
[checks.excessive-blank-identifiers]
severity = "note"
[checks.function-length]
severity = "note"
[checks.redundant-error-return-check]
severity = "note"
[checks.import-alias-naming]
severity = "note"
[checks.interface-method-limit]
severity = "note"
[checks.max-parameters]
severity = "note"
[checks.modifies-parameter]
severity = "note"
[checks.no-else-after-return]
severity = "note"
[checks.no-naked-return]
severity = "note"
[checks.no-package-var]
severity = "note"
[checks.non-canonical-header]
severity = "note"
[checks.package-directory-mismatch]
severity = "note"
[checks.package-naming]
severity = "note"
[checks.partially-typed-constant-group]
severity = "note"
[checks.receiver-naming]
severity = "note"
[checks.redundant-build-tag]
severity = "note"
[checks.redundant-conversion]
severity = "note"
[checks.redundant-import-alias]
severity = "note"
[checks.simplify-range]
severity = "note"
[checks.single-argument-append]
severity = "note"
[checks.standard-http-method-constant]
severity = "note"
[checks.time-date]
severity = "note"
[checks.time-naming]
severity = "note"
[checks.unexported-naming]
severity = "note"
[checks.unnecessary-if]
severity = "note"
[checks.redundant-final-return]
severity = "note"
[checks.redundant-switch-break]
severity = "note"
[checks.single-case-switch]
severity = "note"
[checks.unused-parameter]
severity = "note"
[checks.unused-receiver]
severity = "note"
[checks.use-any]
severity = "note"
[checks.use-errors-new]
severity = "note"
[checks.use-fmt-print]
severity = "note"
[checks.use-slices-sort]
severity = "note"
[checks.var-naming]
severity = "note"
