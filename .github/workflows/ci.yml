name: ci

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Run canonical verification
              run: make verify

    dependencies:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Verify module integrity and tidiness
              run: make dependency-check

    race:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - run: go test -race ./...

    docs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.5"
            - name: Install documentation dependencies
              working-directory: docs
              run: bun ci
            - name: Build documentation and benchmark pages
              working-directory: docs
              run: bun run build
            - name: Require generated documentation to be current
              run: git diff --exit-code

    platform-smoke:
        name: ${{ matrix.os }} filesystem smoke
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [macos-latest, windows-latest]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Test filesystem and path-sensitive packages
              run: go test ./internal/config ./internal/filewrite ./internal/pathfilter ./internal/source ./internal/workspace

    corpus:
        name: open-source corpus and performance
        needs: [test, dependencies]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Check deterministic behavior and performance budgets
              run: make corpus-check
            - name: Upload corpus reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: strider-corpus-report
                  path: target/corpus/
                  if-no-files-found: warn
                  retention-days: 30
