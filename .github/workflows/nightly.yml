name: nightly

on:
    push:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: nightly-release
    cancel-in-progress: true

jobs:
    build:
        name: ${{ matrix.goos }}-${{ matrix.goarch }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - goos: linux
                      goarch: amd64
                      binary: strider
                      archive: strider-nightly-linux-amd64.tar.gz
                    - goos: linux
                      goarch: arm64
                      binary: strider
                      archive: strider-nightly-linux-arm64.tar.gz
                    - goos: darwin
                      goarch: amd64
                      binary: strider
                      archive: strider-nightly-darwin-amd64.tar.gz
                    - goos: darwin
                      goarch: arm64
                      binary: strider
                      archive: strider-nightly-darwin-arm64.tar.gz
                    - goos: windows
                      goarch: amd64
                      binary: strider.exe
                      archive: strider-nightly-windows-amd64.zip
                    - goos: windows
                      goarch: arm64
                      binary: strider.exe
                      archive: strider-nightly-windows-arm64.zip
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Build
              env:
                  CGO_ENABLED: "0"
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  version="nightly-${GITHUB_SHA::7}"
                  mkdir -p package dist
                  go build -trimpath \
                    -ldflags "-s -w -X github.com/gempir/strider/internal/app.version=$version" \
                    -o "package/${{ matrix.binary }}" ./cmd/strider

                  if [[ "${{ matrix.archive }}" == *.zip ]]; then
                    (cd package && zip -q "../dist/${{ matrix.archive }}" "${{ matrix.binary }}")
                  else
                    tar -C package -czf "dist/${{ matrix.archive }}" "${{ matrix.binary }}"
                  fi
            - name: Upload archive
              uses: actions/upload-artifact@v7
              with:
                  name: strider-nightly-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: dist/${{ matrix.archive }}
                  if-no-files-found: error
                  retention-days: 7

    release:
        needs: [test, build]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Download archives
              uses: actions/download-artifact@v8
              with:
                  pattern: "strider-nightly-*"
                  path: dist
                  merge-multiple: true
            - name: Create checksums
              run: |
                  cd dist
                  sha256sum strider-nightly-* > checksums.txt
            - name: Update nightly release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  git tag --force nightly "$GITHUB_SHA"
                  git push --force origin refs/tags/nightly

                  notes="Automated build of commit ${GITHUB_SHA::7} from main."
                  if gh release view nightly >/dev/null 2>&1; then
                    gh release edit nightly \
                      --title "Strider nightly" \
                      --notes "$notes" \
                      --prerelease
                    gh release upload nightly dist/* --clobber
                  else
                    gh release create nightly dist/* \
                      --verify-tag \
                      --title "Strider nightly" \
                      --notes "$notes" \
                      --prerelease
                  fi
